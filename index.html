<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>App Trámites México</title>
    
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-container" id="app">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="time" id="currentTime">9:41</span>
            <span class="icons">
                📶 📡 🔋
            </span>
        </div>

        <!-- Contenido Principal -->
        <div class="main-content" id="mainContent"></div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav" id="bottomNav" style="display: none;">
            <button class="nav-item" data-nav="home">
                <span class="nav-icon">🏠</span>
                <span>Inicio</span>
            </button>
            <button class="nav-item" data-nav="tramites">
                <span class="nav-icon">📋</span>
                <span>Trámites</span>
            </button>
            <button class="nav-item" data-nav="noticias">
                <span class="nav-icon">📰</span>
                <span>Noticias</span>
            </button>
            <button class="nav-item" data-nav="perfil">
                <span class="nav-icon">👤</span>
                <span>Perfil</span>
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
